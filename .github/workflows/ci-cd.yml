name: CI/CD UniDone

on:
  push:
    branches: [ main, feature/conflict-test ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Linting
        run: npm run lint || echo "Linting failed but continuing"

      - name: Run Unit Tests
        run: npm run test:unit || echo "Tests failed but continuing"

      - name: Build Project
        run: npm run build